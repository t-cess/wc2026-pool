name: auto-grade

on:
  workflow_dispatch:
    inputs:
      force:
        description: "ข้าม live-window gate (ไว้เทสนอกเวลาบอล)"
        type: boolean
        default: false
  schedule:
    - cron: "*/5 * * * *"        # สำรอง · ตัวขับหลัก = cron-job.org ยิงทุก 1 นาที

concurrency:
  group: auto-grade
  cancel-in-progress: true       # รอบใหม่จาก pinger ยกเลิกรอบเก่าที่ค้าง (กันพอก)

jobs:
  grade:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: install deps
        working-directory: auto
        run: npm install --no-audit --no-fund
      - name: run auto-grade (poll 2 ครั้ง ห่าง 30 วิ → ~30s/ครั้ง)
        working-directory: auto
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          QWEN_TOKEN: ${{ secrets.QWEN_TOKEN }}
          FORCE_FLAG: ${{ inputs.force && '--force' || '' }}
        run: |
          node auto-grade.mjs $FORCE_FLAG || true
          sleep 30
          node auto-grade.mjs $FORCE_FLAG || true
