name: auto-grade

on:
  workflow_dispatch:
    inputs:
      force:
        description: "ข้าม live-window gate (ไว้เทสนอกเวลาบอล)"
        type: boolean
        default: false
      regrade:
        description: "ตรวจซ้ำทุกคู่ (เก็บตกคู่ที่ค้าง/ไม่ได้ตรวจ เช่นหลัง DB ล่ม)"
        type: boolean
        default: false
      linetest:
        description: "ยิงข้อความทดสอบไป LINE (เทส token/group)"
        type: boolean
        default: false
      dry:
        description: "dry-run: ไม่เขียน DB/ไม่ยิง LINE — โชว์ข้อความที่ DeepSeek แต่งใน log (ดูตัวอย่างก่อนใช้จริง)"
        type: boolean
        default: false
  schedule:
    - cron: "*/5 * * * *"        # สำรอง · ตัวขับหลัก = cron-job.org ยิงทุก 1 นาที

concurrency:
  group: auto-grade
  cancel-in-progress: true       # รอบใหม่จาก pinger ยกเลิกรอบเก่าที่ค้าง (กันพอก)

jobs:
  grade:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: install deps
        working-directory: auto
        run: npm install --no-audit --no-fund
      - name: run auto-grade (ครั้งเดียว/รอบ — ลด Firestore read)
        working-directory: auto
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          DS_TOKEN: ${{ secrets.QWEN_TOKEN }}        # GH secret ยังชื่อ QWEN_TOKEN (เปลี่ยนใน repo settings ได้ถ้าต้องการ)
          DS_BASE_URL: https://api.deepseek.com
          DS_MODEL: deepseek-v4-pro
          LINE_TOKEN: ${{ secrets.LINE_TOKEN }}
          LINE_GROUP: ${{ secrets.LINE_GROUP }}
          LINE_LOCKPOST: "1"        # #1 ปิดรับ → โพสต์โพยทั้งวง (เปิดกลับ ก.ค. โควต้ารีเซ็ต · #5 เตือนก่อนปิดยังปิด)
          FORCE_FLAG: ${{ inputs.force && '--force' || '' }}
          REGRADE_FLAG: ${{ inputs.regrade && '--regrade' || '' }}
          LINETEST_FLAG: ${{ inputs.linetest && '--line-test' || '' }}
          DRY_FLAG: ${{ inputs.dry && '--dry-run' || '' }}
        run: node auto-grade.mjs $FORCE_FLAG $REGRADE_FLAG $LINETEST_FLAG $DRY_FLAG || true
