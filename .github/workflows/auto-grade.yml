name: auto-grade

on:
  workflow_dispatch:
    inputs:
      force:
        description: "ข้าม live-window gate (ไว้เทสนอกเวลาบอล)"
        type: boolean
        default: false
  schedule:
    - cron: "*/30 * * * *"       # backstop เผื่อ chain ตาย (ตัวขับหลัก = self-chain ด้วย PINGER_PAT)

concurrency:
  group: auto-grade
  cancel-in-progress: true       # มีตัวเดียวเสมอ (กัน chain ซ้อน/พอก)

jobs:
  grade:
    runs-on: ubuntu-latest
    timeout-minutes: 28
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: install deps
        working-directory: auto
        run: npm install --no-audit --no-fund
      - name: poll loop (~25 นาที · บอลสด=ทุก 30 วิ · ว่าง=ทุก 2 นาที)
        working-directory: auto
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          QWEN_TOKEN: ${{ secrets.QWEN_TOKEN }}
          FORCE_FLAG: ${{ inputs.force && '--force' || '' }}
        run: |
          end=$((SECONDS+1500))
          while [ $SECONDS -lt $end ]; do
            out=$(node auto-grade.mjs $FORCE_FLAG 2>&1); echo "$out"
            if echo "$out" | grep -q '__LIVE__:1'; then sleep 30; else sleep 120; fi
          done
      - name: ต่อรอบเอง (self-chain)
        if: always()
        env:
          GH_TOKEN: ${{ secrets.PINGER_PAT }}
        run: gh workflow run auto-grade.yml -R ${{ github.repository }}
