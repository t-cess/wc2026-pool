name: auto-grade

on:
  workflow_dispatch:
    inputs:
      force:
        description: "ข้าม live-window gate (ไว้เทสนอกเวลาบอล)"
        type: boolean
        default: false
      regrade:
        description: "ตรวจซ้ำทุกคู่ (เก็บตกคู่ที่ค้าง/ไม่ได้ตรวจ เช่นหลัง DB ล่ม)"
        type: boolean
        default: false
      linetest:
        description: "ยิงข้อความทดสอบไป LINE (เทส token/group)"
        type: boolean
        default: false
  schedule:
    - cron: "*/5 * * * *"        # สำรอง · ตัวขับหลัก = cron-job.org ยิงทุก 1 นาที

concurrency:
  group: auto-grade
  cancel-in-progress: true       # รอบใหม่จาก pinger ยกเลิกรอบเก่าที่ค้าง (กันพอก)

jobs:
  grade:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: install deps
        working-directory: auto
        run: npm install --no-audit --no-fund
      - name: run auto-grade (ครั้งเดียว/รอบ — ลด Firestore read)
        working-directory: auto
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          QWEN_TOKEN: ${{ secrets.QWEN_TOKEN }}
          QWEN_BASE_URL: https://api.deepseek.com
          QWEN_MODEL: deepseek-chat
          LINE_TOKEN: ${{ secrets.LINE_TOKEN }}
          LINE_GROUP: ${{ secrets.LINE_GROUP }}
          FORCE_FLAG: ${{ inputs.force && '--force' || '' }}
          REGRADE_FLAG: ${{ inputs.regrade && '--regrade' || '' }}
          LINETEST_FLAG: ${{ inputs.linetest && '--line-test' || '' }}
        run: node auto-grade.mjs $FORCE_FLAG $REGRADE_FLAG $LINETEST_FLAG || true
