<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
<title>จัดการ · ทายบอลโลก 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Kanit:wght@500;600;700;800&family=IBM+Plex+Sans+Thai:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/themes/dark.css">
<script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
<style>
  :root{ --bg:#070809; --panel:#0B0D11; --card:#14171D; --line:#232830; --line2:#2A303A;
         --ink:#EEF1F4; --mut:#8A929E; --dim:#5b626d; --green:#1FB85E; --greenL:#5fcf94;
         --blue:#2D7DF6; --red:#EF3E42; --gold:#caa75a; --inkField:#0E1116; }
  *{ box-sizing:border-box; }
  html,body{ overflow-x:hidden; }
  body{ margin:0; background:var(--panel); font-family:'IBM Plex Sans Thai',sans-serif; -webkit-font-smoothing:antialiased; color:var(--ink); }
  .k{ font-family:'Kanit',sans-serif; }
  input,select{ outline:none; -webkit-appearance:none; }
  input::placeholder{ color:var(--dim); }
  ::-webkit-scrollbar{ width:0; height:0; }
  .app{ width:100%; max-width:560px; margin:0 auto; min-height:100vh; min-height:100dvh; background:var(--panel); display:flex; flex-direction:column; }
  .field{ width:100%; height:42px; padding:0 13px; font-size:13px; color:var(--ink); background:var(--inkField); border:1px solid var(--line2); border-radius:11px; font-family:'IBM Plex Sans Thai'; }
  select.field{ background-image:none; }
  .btnG{ display:flex;align-items:center;justify-content:center; background:var(--green); color:#04210F; border:none; border-radius:12px; font-family:'Kanit'; font-weight:700; cursor:pointer; }
  .hidden{ display:none !important; }
  @keyframes toastIn{from{opacity:0;transform:translate(-50%,8px)}to{opacity:1;transform:translate(-50%,0)}}
  #toast{ position:fixed; left:50%; bottom:28px; transform:translateX(-50%); background:#1b1f27; color:#EEF1F4; border:1px solid #2A303A; padding:11px 18px; border-radius:12px; font-size:13px; z-index:99; animation:toastIn .18s ease; max-width:90%; text-align:center; }
  .mgtab{ flex:1; text-align:center; padding:13px 4px; cursor:pointer; font-size:13px; user-select:none; }
</style>
</head>
<body>
<div class="app">
  <!-- LOGIN -->
  <div id="mgLogin" class="hidden" style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;padding:40px 26px;">
    <h1 class="k" style="margin:0;font-weight:800;font-size:28px;">⚙️ จัดการ</h1>
    <p style="margin:0;color:var(--mut);font-size:14px;text-align:center;">ศูนย์คุมทุกวง — เฉพาะ super admin</p>
    <div id="mgGoogle" class="k btnG" style="height:52px;width:100%;max-width:300px;font-size:16px;">เข้าด้วย Google</div>
    <div id="mgLiMsg" style="color:#f0a3a8;font-size:12px;text-align:center;"></div>
  </div>
  <!-- BLOCK (ไม่ใช่ super) -->
  <div id="mgBlock" class="hidden" style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;padding:40px 26px;">
    <h2 class="k" style="margin:0;font-weight:800;font-size:22px;">เฉพาะ super</h2>
    <p style="margin:0;color:var(--mut);font-size:14px;text-align:center;">บัญชีนี้ไม่มีสิทธิ์เข้าหน้าจัดการ</p>
    <div id="mgBlockOut" class="k" style="cursor:pointer;color:#f0a3a8;font-size:14px;font-weight:700;" onclick="location.reload()">ลองบัญชีอื่น (รีโหลด)</div>
  </div>
  <!-- APP -->
  <div id="mgApp" class="hidden" style="flex:1;display:flex;flex-direction:column;">
    <div style="display:flex;align-items:center;gap:8px;padding:16px 16px 10px;">
      <h1 class="k" style="margin:0;font-weight:800;font-size:22px;flex:1;">⚙️ จัดการ</h1>
      <span class="k" style="font-size:10px;letter-spacing:1px;color:#b9a6f0;border:1px solid #34294f;border-radius:6px;padding:3px 7px;">SUPER · ทุกวง</span>
      <div id="mgLogout" class="k" style="cursor:pointer;font-size:11px;color:#f0a3a8;border:1px solid #5a2227;border-radius:8px;padding:5px 9px;">ออก</div>
    </div>
    <div style="display:flex;border-bottom:1px solid var(--line);position:sticky;top:0;background:var(--panel);z-index:5;">
      <div class="mgtab k" data-mgtab="pools">วง</div>
      <div class="mgtab k" data-mgtab="scores">สกอร์&คนยิง</div>
      <div class="mgtab k" data-mgtab="champ">แชมป์</div>
      <div class="mgtab k" data-mgtab="matches">การแข่งขัน</div>
    </div>
    <div id="mgContent" style="flex:1;padding:15px 14px 60px;"></div>
  </div>
</div>
<div id="toast" class="hidden"></div>
<script type="module" src="mgmain.js"></script>
</body>
</html>
